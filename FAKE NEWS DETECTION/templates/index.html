<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News | Advanced Fake News Detector</title>
    <link rel="stylesheet" href="{{ url_with_static('style.css') if False else '/static/style.css' }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <header>
            <div class="logo">Fake News<span> Detector</span></div>
            <p class="subtitle">Empowering truth through advanced Machine Learning analysis</p>
        </header>

        <main class="main-card">
            <div class="input-group">
                <label for="newsText">Paste Article Content or Headline</label>
                <textarea id="newsText" placeholder="Paste the text of the news article here (minimum 10 words recommended for higher accuracy)..."></textarea>
            </div>

            <button id="analyzeBtn" onclick="analyzeNews()">Analyze Authenticity</button>

            <div id="resultContainer" class="result-card hidden">
                <div class="result-icon" id="resultIcon"></div>
                <div class="result-details">
                    <h3 id="resultVerdict">Analyzing...</h3>
                    <p id="resultMessage">Please wait while our NLP model processes the text structure.</p>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Veritas AI. Powered by Passive-Aggressive NLP Classification.</p>
        </footer>
    </div>

    <script>
        async function analyzeNews() {
            const text = document.getElementById('newsText').value;
            const btn = document.getElementById('analyzeBtn');
            const resultContainer = document.getElementById('resultContainer');
            const resultVerdict = document.getElementById('resultVerdict');
            const resultMessage = document.getElementById('resultMessage');

            if (!text.trim()) {
                alert('Please paste some text to analyze.');
                return;
            }

            // UI Loading State
            btn.innerText = 'Analyzing Content...';
            btn.disabled = true;
            resultContainer.classList.add('hidden');

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });

                const data = await response.json();

                if (response.ok) {
                    resultContainer.classList.remove('hidden');
                    resultVerdict.innerText = data.prediction;
                    resultMessage.innerText = data.message;

                    // Style dynamic response based on ML outcome
                    if (data.prediction === 'REAL') {
                        resultContainer.className = "result-card real-news";
                    } else {
                        resultContainer.className = "result-card fake-news";
                    }
                } else {
                    alert(data.error || 'Something went wrong.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to connect to the backend server.');
            } finally {
                btn.innerText = 'Analyze Authenticity';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
